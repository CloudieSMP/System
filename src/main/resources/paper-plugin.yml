name: System
description: Cloudie SMP S10 System
api-version: "1.21.11"
authors: [Sebiann]
website: https://sebiann.moe

version: "${version}"
main: System
load: STARTUP

permissions:
  cloudie.silent:
    description: Allows the player to join and quit the server silently.
    default: false
    children:
      cloudie.silent.join: true
      cloudie.silent.quit: true
  cloudie.silent.join:
    description: Allows the player to quit the server silently.
    default: false
  cloudie.silent.quit:
    description: Allows the player to quit the server silently.
    default: false

  cloudie.group.admin:
    description: Allows the player to use all admin commands.
    default: op
    children:
      cloudie.cmd.reload: true
      cloudie.cmd.admin_chat: true
      cloudie.cmd.dev_chat: true
      cloudie.cmd.vanish: true
      cloudie.cmd.debug: true
      cloudie.cmd.announce: true
      cloudie.cmd.timer: true
      cloudie.cmd.height.others: true

  cloudie.group.dev:
    description: Allows the player to use developer chat and receive developer messages.
    default: false
    children:
      cloudie.cmd.dev_chat: true

  cloudie.cmd.reload:
    description: Allows the player to reload the plugin.
  cloudie.cmd.admin_chat:
    description: Allows the player to use the admin chat command.
  cloudie.cmd.dev_chat:
    description: Allows the player to use the developer chat command.
  cloudie.cmd.vanish:
    description: Allows the player to use the vanish command.
  cloudie.cmd.debug:
    description: Allows the player to use debug commands.
  cloudie.cmd.announce:
    description: Allows the player to use the announce command.
  cloudie.cmd.timer:
    description: Allows the player to use the timer command.
  cloudie.cmd.height.others:
    description: Allows the player to check height of other players.

  cloudie.group.default:
    description: Allows the player to use all default commands.
    default: true
    children:
      cloudie.cmd.hat: true
      cloudie.cmd.help: true
      cloudie.cmd.seed: true
      cloudie.cmd.height: true
      cloudie.cmd.flex: true
      cloudie.cmd.book: true
      cloudie.cmd.renameitem: true
      cloudie.cmd.resetitemname: true
      cloudie.cmd.crates: true
      cloudie.cmd.boosters: true
      cloudie.cmd.home: true
      cloudie.cmd.spawn: true
      cloudie.cmd.streamermode: true
      cloudie.cmd.tpa: true
      cloudie.cmd.echo: true
      cloudie.cmd.mail: true

  cloudie.cmd.hat:
    description: Allows the player to use the hat command.
  cloudie.cmd.help:
    description: Allows the player to use the help command.
  cloudie.cmd.seed:
    description: Allows the player to use the seed command.
  cloudie.cmd.height:
    description: Allows the player to use the height command.
  cloudie.cmd.flex:
    description: Allows the player to use the flex command.
  cloudie.cmd.book:
    description: Allows the player to use book commands.
  cloudie.cmd.renameitem:
    description: Allows the player to rename items.
  cloudie.cmd.resetitemname:
    description: Allows the player to reset item names.
  cloudie.cmd.crates:
    description: Allows the player to open the crates browser.
  cloudie.cmd.boosters:
    description: Allows the player to open the booster packs browser.
  cloudie.cmd.home:
    description: Allows the player to manage personal homes.
  cloudie.cmd.spawn:
    description: Allows the player to use the spawn command.
  cloudie.cmd.streamermode:
    description: Allows the player to toggle streamer mode.
  cloudie.cmd.tpa:
    description: Allows the player to send tpa requests.
  cloudie.cmd.echo:
    description: Allows the player to use the echo command.
  cloudie.cmd.mail:
    description: Allows the player to use mailbox commands.
